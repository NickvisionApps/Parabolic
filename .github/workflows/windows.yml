on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [ "review_requested", "ready_for_review" ]
  workflow_dispatch:
name: Windows
permissions:
  id-token: write
  contents: read
env:
  PROJECT_NAME: Nickvision.Parabolic.WinUI
  INSTALLER_NAME: NickvisionParabolicSetup
  SHORT_NAME: Parabolic
jobs:
  winui-windows:
    name: "WinUI on Windows"
    if: ${{ github.event.pull_request.user.login != 'weblate' }}
    strategy:
      matrix:
        variant:
          - arch: x64
            runner: windows-2025-vs2026
            subsys: mingw64
            type: x86_64
            ffmpeg: win64
            deno: x86_64
            ytdlp: ""
          - arch: arm64
            runner: windows-11-arm
            subsys: clangarm64
            type: clang-aarch64
            ffmpeg: winarm64
            deno: aarch64
            ytdlp: _arm64
    runs-on: ${{ matrix.variant.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: ${{ matrix.variant.subsys }}
          install: mingw-w64-${{ matrix.variant.type }}-gettext-tools mingw-w64-${{ matrix.variant.type }}-yelp-tools
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: "Setup Environment"
        shell: pwsh
        run: echo "${{ steps.msys2.outputs.msys2-location }}\${{ matrix.variant.subsys }}\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: "Restore"
        run: |
          $vsInstallPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          Import-Module "$vsInstallPath\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vsInstallPath -SkipAutomaticLocation
          dotnet restore ${{ env.PROJECT_NAME }} --runtime win-${{ matrix.variant.arch }} /p:PublishReadyToRun=true
      - name: "Publish"
        run: |
          $vsInstallPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          Import-Module "$vsInstallPath\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vsInstallPath -SkipAutomaticLocation
          dotnet publish ${{ env.PROJECT_NAME }} -c Release --no-restore --runtime win-${{ matrix.variant.arch }} /p:Platform=${{ matrix.variant.arch }}
      - name: "Installer"
        working-directory: ${{github.workspace}}/inno
        env:
          APP_FILES_PATH: ${{ env.PROJECT_NAME }}/bin/${{ matrix.variant.arch }}/Release/net10.0-windows10.0.19041.0/win-${{ matrix.variant.arch }}/publish
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest https://github.com/yt-dlp/yt-dlp/releases/download/2026.03.17/yt-dlp${{ matrix.variant.ytdlp }}.exe -OutFile yt-dlp.exe
          Invoke-WebRequest https://github.com/Elypha/aria2-mod/releases/download/aria2c-1.37.0-b4fd7cb-20251126/aria2c-windows-x86_64-wintls.zip -OutFile aria2.zip
          Invoke-WebRequest https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-${{ matrix.variant.ffmpeg }}-gpl-8.1.zip -OutFile ffmpeg.zip
          Invoke-WebRequest https://github.com/denoland/deno/releases/download/v2.7.14/deno-${{ matrix.variant.deno }}-pc-windows-msvc.zip -OutFile deno.zip
          Expand-Archive -Force 'aria2.zip'
          Expand-Archive -Force 'ffmpeg.zip'
          Expand-Archive -Force 'deno.zip'
          move aria2\aria2c.exe aria2c.exe
          move ffmpeg\ffmpeg-n8.1-latest-${{ matrix.variant.ffmpeg }}-gpl-8.1\bin\ffmpeg.exe ffmpeg.exe
          move ffmpeg\ffmpeg-n8.1-latest-${{ matrix.variant.ffmpeg }}-gpl-8.1\bin\ffprobe.exe ffprobe.exe
          move ffmpeg\ffmpeg-n8.1-latest-${{ matrix.variant.ffmpeg }}-gpl-8.1\bin\ffplay.exe ffplay.exe
          move deno\deno.exe deno.exe
          iscc setup.iss
      - name: "Portable"
        shell: pwsh
        run: |
          $publishDir = "${{ env.PROJECT_NAME }}\bin\${{ matrix.variant.arch }}\Release\net10.0-windows10.0.19041.0\win-${{ matrix.variant.arch }}\publish"
          $portableDir = "${{ github.workspace }}\portable"
          $innoDir = "${{ github.workspace }}\inno"
          New-Item -ItemType Directory -Force -Path "$portableDir\Release" | Out-Null
          Copy-Item -Path "$publishDir\*" -Destination "$portableDir\Release" -Recurse
          $batContent = "@echo off`r`n`"%~dp0Release\${{ env.PROJECT_NAME }}.exe`" --portable"
          Set-Content -Path "$portableDir\${{ env.SHORT_NAME }}.bat" -Value $batContent -NoNewline
          move $innoDir\yt-dlp.exe $portableDir\Release\yt-dlp.exe
          move $innoDir\aria2c.exe $portableDir\Release\aria2c.exe
          move $innoDir\ffmpeg.exe $portableDir\Release\ffmpeg.exe
          move $innoDir\ffprobe.exe $portableDir\Release\ffprobe.exe
          move $innoDir\ffplay.exe $portableDir\Release\ffplay.exe
          move $innoDir\deno.exe $portableDir\Release\deno.exe
      - uses: actions/upload-artifact@v4
        with:
          path: ${{ github.workspace }}/inno/${{ env.INSTALLER_NAME }}.exe
          name: ${{ env.INSTALLER_NAME }}-${{ matrix.variant.arch }}
      - uses: actions/upload-artifact@v4
        with:
          path: ${{ github.workspace }}/portable
          name: ${{ env.PROJECT_NAME }}-portable-${{ matrix.variant.arch }}